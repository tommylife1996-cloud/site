<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coin Analiz Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #f6c453;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #f6c453;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
    }

    .good { color: #22c55e; }
    .bad { color: #ef4444; }
  </style>
</head>

<body>

<div class="container">
  <h1>Coin Analiz Pro</h1>

  <div class="card">
    <label>Coin</label>
    <input id="coin" value="BTC">

    <label>Parite</label>
    <select id="pair">
      <option value="USDT">USDT</option>
      <option value="TRY">TRY</option>
    </select>

    <label>Adet</label>
    <input id="amount" type="number" value="1">

    <label>Ortalama Maliyet</label>
    <input id="cost" type="number" value="0">

    <button onclick="analyze()">Analiz Et</button>

    <div class="result" id="result">
      Veri bekleniyor...
    </div>
  </div>
</div>

<script>
async function analyze() {
  const coin = document.getElementById("coin").value.toUpperCase();
  const pair = document.getElementById("pair").value;
  const amount = Number(document.getElementById("amount").value);
  const cost = Number(document.getElementById("cost").value);

  const symbol = coin + pair;

  try {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
    const data = await res.json();

    const price = Number(data.price);
    const value = price * amount;
    const totalCost = cost * amount;
    const pnl = value - totalCost;

    document.getElementById("result").innerHTML = `
      <b>Fiyat:</b> ${price.toFixed(4)} ${pair}<br>
      <b>Toplam Değer:</b> ${value.toFixed(2)} ${pair}<br>
      <b>Kâr/Zarar:</b> <span class="${pnl >= 0 ? 'good' : 'bad'}">${pnl.toFixed(2)} ${pair}</span>
    `;
  } catch (e) {
    document.getElementById("result").innerText = "Veri alınamadı";
  }
}
</script>

</body>
</html>
